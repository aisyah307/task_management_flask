name: CI Task Manager Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  development-audit:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil kode dari repositori GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Menyiapkan lingkungan Python versi 3.10
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Memasang semua dependensi dari requirements.txt serta alat audit
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pip-audit

    # 4. Statis Analisis: Memeriksa kerapian kode (PEP 8) menggunakan Flake8
    - name: Lint with flake8 (Static Code Analysis)
      run: |
        # Menghentikan proses jika ada eror sintaksis atau nama variabel yang tidak terdefinisi
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Menghitung total peringatan kosmetik kode (maksimal 127 karakter per baris)
        flake8 . --count --max-line-length=127 --statistics

    # 5. Pengujian Fungsional: Menjalankan Pytest dan menghitung Code Coverage
    - name: Run functional tests with pytest and coverage
      run: |
        python -m pytest --cov=app --cov-report=term-missing tests/

    # 6. Audit Keamanan: Memeriksa celah keamanan pada pustaka yang terpasang
    - name: Cyber Security Audit (pip-audit)
      run: |
        pip-audit